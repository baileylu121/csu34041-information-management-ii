<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="CSU 34041 Information Management II — Study Resources" />
    <title>Information Management II · CSU 34041</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0f13;
        --bg-card: #1a1a24;
        --bg-elevated: #22222e;
        --bg-hover: #2a2a3a;
        --border: #2e2e3e;
        --text: #e8e8ee;
        --text-muted: #8888a0;
        --text-dim: #555568;
        --accent: #6c5ce7;
        --accent-glow: rgba(108, 92, 231, 0.15);
        --success: #00b894;
        --radius: 12px;
        --radius-sm: 8px;
        --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family:
          "Inter",
          "SF Pro Display",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 60px 60px;
        opacity: 0.25;
        mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 20%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 20%, transparent 70%);
        pointer-events: none;
      }

      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.12;
        pointer-events: none;
        z-index: 0;
      }
      .orb--purple {
        width: 500px;
        height: 500px;
        background: var(--accent);
        top: -10%;
        left: 15%;
        animation: orbFloat 20s ease-in-out infinite alternate;
      }
      .orb--teal {
        width: 400px;
        height: 400px;
        background: var(--success);
        bottom: -5%;
        right: 10%;
        animation: orbFloat 25s ease-in-out infinite alternate-reverse;
      }

      @keyframes orbFloat {
        0% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(40px, -30px) scale(1.1);
        }
        100% {
          transform: translate(-20px, 20px) scale(0.95);
        }
      }

      #network {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      .page {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
      }

      .container {
        max-width: 560px;
        width: 100%;
        text-align: center;
      }

      .logo {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--accent);
        font-weight: 600;
        margin-bottom: 1rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }
      .logo::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        background: var(--accent);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(1.3);
        }
      }

      .title {
        font-size: clamp(2rem, 6vw, 2.75rem);
        font-weight: 300;
        letter-spacing: -0.03em;
        color: var(--text);
        margin-bottom: 0.5rem;
        line-height: 1.15;
      }
      .title strong {
        font-weight: 600;
        background: linear-gradient(135deg, var(--accent), #a29bfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 0.95rem;
        color: var(--text-muted);
        font-weight: 400;
        margin-bottom: 2.5rem;
      }

      .nav {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .nav-link {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1.25rem 1.5rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        transition: all var(--transition);
        position: relative;
        overflow: hidden;
      }
      .nav-link::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, var(--accent-glow), transparent 60%);
        opacity: 0;
        transition: opacity var(--transition);
      }
      .nav-link:hover::before {
        opacity: 1;
      }
      .nav-link:hover {
        background: var(--bg-hover);
        border-color: var(--accent);
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(108, 92, 231, 0.1);
      }

      .nav-link-body {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.15rem;
        position: relative;
        z-index: 1;
      }

      .nav-link-title {
        font-size: 0.95rem;
        font-weight: 500;
      }

      .nav-link-desc {
        font-size: 0.78rem;
        color: var(--text-muted);
        font-weight: 400;
      }

      .nav-link-icon {
        position: relative;
        z-index: 1;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-sm);
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        flex-shrink: 0;
        transition: all var(--transition);
      }
      .nav-link:hover .nav-link-icon {
        border-color: var(--accent);
        background: var(--accent-glow);
      }
      .nav-link-icon svg {
        width: 18px;
        height: 18px;
        stroke: var(--text-muted);
        transition: stroke var(--transition);
      }
      .nav-link:hover .nav-link-icon svg {
        stroke: var(--accent);
      }

      .nav-link-arrow {
        color: var(--text-dim);
        font-size: 1.1rem;
        transition: transform var(--transition);
        flex-shrink: 0;
        position: relative;
        z-index: 1;
        margin-left: auto;
      }
      .nav-link:hover .nav-link-arrow {
        transform: translateX(3px);
      }

      .footer {
        margin-top: 3rem;
        font-size: 0.75rem;
        color: var(--text-dim);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }

      .scroll-hint {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 3;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-dim);
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        animation: scrollBounce 2s ease-in-out infinite;
        pointer-events: none;
      }
      .scroll-hint svg {
        width: 16px;
        height: 16px;
        stroke: var(--text-dim);
      }
      @keyframes scrollBounce {
        0%,
        100% {
          transform: translateX(-50%) translateY(0);
          opacity: 0.6;
        }
        50% {
          transform: translateX(-50%) translateY(6px);
          opacity: 1;
        }
      }

      @media (max-width: 480px) {
        .nav-link {
          padding: 1rem 1.25rem;
        }
        .nav-link-icon {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="orb orb--purple"></div>
    <div class="orb orb--teal"></div>
    <canvas id="network"></canvas>

    <div class="page">
      <div class="container">
        <div class="logo">CSU 34041</div>
        <h1 class="title"><strong>Information</strong> Management II</h1>
        <p class="subtitle">Study resources &amp; self-assessment</p>

        <nav class="nav">
          <a href="/quiz" class="nav-link">
            <span class="nav-link-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z"
                />
              </svg>
            </span>
            <span class="nav-link-body">
              <span class="nav-link-title">Quiz</span>
              <span class="nav-link-desc">Practice questions &amp; exam prep</span>
            </span>
            <span class="nav-link-arrow">&rarr;</span>
          </a>

          <a href="/docs" class="nav-link">
            <span class="nav-link-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"
                />
              </svg>
            </span>
            <span class="nav-link-body">
              <span class="nav-link-title">Docs</span>
              <span class="nav-link-desc">Course notes, guides &amp; past papers</span>
            </span>
            <span class="nav-link-arrow">&rarr;</span>
          </a>
        </nav>

        <div class="footer">
          <span>CSU 34041 — Information Management II</span>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const NODE_COUNT = 35;
        const CONNECT_DIST = 200;
        const PARTICLE_COUNT = 3;
        const MOUSE_RADIUS = 150;
        const BASE_SPEED = 0.5;
        const MOUSE_FORCE = 0.25;
        const DAMPING = 0.96;
        const SPAWN_MARGIN = 60;

        const canvas = document.getElementById("network");
        const ctx = canvas.getContext("2d");
        let W, H, dpr;
        let mouse = { x: -9999, y: -9999 };
        let nodes = [];
        let particles = [];

        function resize() {
          dpr = window.devicePixelRatio || 1;
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        class Node {
          constructor() {
            this.x = Math.random() * W;
            this.y = Math.random() * H;
            this.vx = (Math.random() - 0.5) * BASE_SPEED * 2;
            this.vy = (Math.random() - 0.5) * BASE_SPEED * 2;
            this.r = 1.5 + Math.random() * 2;
            this.baseAlpha = 0.2 + Math.random() * 0.4;
            this.alpha = this.baseAlpha;
          }

          update() {
            this.x += this.vx;
            this.y += this.vy;

            const m = SPAWN_MARGIN;
            if (this.x < -m) this.x = W + m;
            if (this.x > W + m) this.x = -m;
            if (this.y < -m) this.y = H + m;
            if (this.y > H + m) this.y = -m;

            const dx = this.x - mouse.x;
            const dy = this.y - mouse.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < MOUSE_RADIUS) {
              const force = ((MOUSE_RADIUS - dist) / MOUSE_RADIUS) * MOUSE_FORCE;
              this.vx += (dx / dist) * force;
              this.vy += (dy / dist) * force;
            }

            this.vx *= DAMPING;
            this.vy *= DAMPING;

            this.alpha = this.baseAlpha + Math.sin(Date.now() * 0.002 + this.x) * 0.1;
          }

          draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(108, 92, 231, ${this.alpha})`;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(108, 92, 231, ${this.alpha * 0.15})`;
            ctx.fill();
          }
        }

        class Particle {
          constructor(startNode, endNode) {
            this.start = startNode;
            this.end = endNode;
            this.t = 0;
            this.speed = 0.002 + Math.random() * 0.004;
            this.alpha = 0.5 + Math.random() * 0.3;
          }

          update() {
            this.t += this.speed;
            return this.t <= 1;
          }

          draw() {
            const x = this.start.x + (this.end.x - this.start.x) * this.t;
            const y = this.start.y + (this.end.y - this.start.y) * this.t;

            const prevX = this.start.x + (this.end.x - this.start.x) * Math.max(0, this.t - 0.05);
            const prevY = this.start.y + (this.end.y - this.start.y) * Math.max(0, this.t - 0.05);

            ctx.beginPath();
            ctx.moveTo(prevX, prevY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = `rgba(108, 92, 231, ${this.alpha})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(x, y, 2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(162, 155, 254, ${this.alpha})`;
            ctx.fill();
          }
        }

        function init() {
          resize();
          nodes = [];
          particles = [];

          for (let i = 0; i < NODE_COUNT; i++) {
            nodes.push(new Node());
          }

          for (let i = 0; i < PARTICLE_COUNT; i++) {
            spawnParticle();
          }
        }

        function spawnParticle() {
          if (nodes.length < 2) return;
          const a = nodes[Math.floor(Math.random() * nodes.length)];
          const b = nodes[Math.floor(Math.random() * nodes.length)];
          const dx = a.x - b.x,
            dy = a.y - b.y;
          if (a !== b && Math.sqrt(dx * dx + dy * dy) < CONNECT_DIST) {
            particles.push(new Particle(a, b));
          }
        }

        function drawConnections() {
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);

              if (dist < CONNECT_DIST) {
                const alpha = (1 - dist / CONNECT_DIST) * 0.15;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = `rgba(108, 92, 231, ${alpha})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
              }
            }
          }
        }

        let lastParticleSpawn = 0;
        function animate(ts) {
          ctx.clearRect(0, 0, W, H);

          drawConnections();

          for (const n of nodes) {
            n.update();
            n.draw();
          }

          if (ts - lastParticleSpawn > 1500) {
            spawnParticle();
            lastParticleSpawn = ts;
          }

          for (let i = particles.length - 1; i >= 0; i--) {
            if (!particles[i].update()) {
              particles.splice(i, 1);
              spawnParticle();
            } else {
              particles[i].draw();
            }
          }

          requestAnimationFrame(animate);
        }

        window.addEventListener("resize", () => {
          resize();
        });
        window.addEventListener("mousemove", (e) => {
          mouse.x = e.clientX;
          mouse.y = e.clientY;
        });
        window.addEventListener("mouseleave", () => {
          mouse.x = -9999;
          mouse.y = -9999;
        });

        window.addEventListener(
          "touchmove",
          (e) => {
            if (e.touches.length > 0) {
              mouse.x = e.touches[0].clientX;
              mouse.y = e.touches[0].clientY;
            }
          },
          { passive: true },
        );
        window.addEventListener("touchend", () => {
          mouse.x = -9999;
          mouse.y = -9999;
        });

        init();
        requestAnimationFrame(animate);
      })();
    </script>
  </body>
</html>
